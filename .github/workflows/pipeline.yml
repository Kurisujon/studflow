name: Pipeline

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile backend modules
        run: python -m compileall .

      - name: Smoke test FastAPI app import
        run: python -c "from main import app; print(app.title)"

  deploy-staging:
    name: Deploy staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs:
      - frontend
      - backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger staging deployment
        run: doctl apps create-deployment "${{ secrets.DIGITALOCEAN_STAGING_APP_ID }}" --update-sources --force-rebuild --wait

  deploy-production:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - frontend
      - backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger production deployment
        run: doctl apps create-deployment "${{ secrets.DIGITALOCEAN_PRODUCTION_APP_ID }}" --update-sources --force-rebuild --wait
